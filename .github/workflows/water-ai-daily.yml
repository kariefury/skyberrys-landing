name: Daily water-AI data collection

on:
  schedule:
    # Runs at 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write      # needed to commit updated JSON files

jobs:
  collect-and-score:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: water-ai-tracker   # all run: steps execute from here

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect data
        env:
          NEWS_API_KEY:           ${{ secrets.NEWS_API_KEY }}
          REDDIT_CLIENT_ID:       ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET:   ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT:      "WaterAITracker/1.0 (github.com/${{ github.repository }})"
          GITHUB_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          TWITTER_BEARER_TOKEN:   ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: python scripts/collect.py

      - name: Score companies
        run: python scripts/score.py

      - name: Commit updated data
        working-directory: .   # git must run from repo root
        run: |
          git config user.name  "water-ai-tracker[bot]"
          git config user.email "actions@github.com"
          git add water-ai-tracker/data/scores.json \
                  water-ai-tracker/data/articles.json \
                  water-ai-tracker/data/mentions.json
          git diff --cached --quiet || git commit -m "data: daily update $(date -u +%Y-%m-%d)"
          git push
